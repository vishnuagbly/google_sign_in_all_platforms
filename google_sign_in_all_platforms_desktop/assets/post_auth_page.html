<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Processing</title>
    <style>
        :root {
            --light-bg: linear-gradient(135deg, #4facfe, #00f2fe);
            --light-text: #fff;
            --dark-bg: #121212;
            --dark-text: #e0e0e0;
            --dark-card-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--light-bg);
            color: var(--light-text);
            transition: background 0.3s, color 0.3s;
        }

        .message-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 15px;
        }

        p {
            font-size: 1.2rem;
            margin: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: var(--dark-bg);
                color: var(--dark-text);
            }

            .message-container {
                background: var(--dark-card-bg);
            }
        }
    </style>
</head>
<body>
<div class="message-container">
    <h1 id="status">Processing Authentication...</h1>
    <p id="message">Please wait while we complete your authentication.</p>
</div>

<script>
    // UI update function
    function updateUI(title, message, isSuccess = true) {
        document.getElementById('status').textContent = title;
        document.getElementById('message').textContent = message;

        if (!isSuccess) {
            document.querySelector('.message-container').style.background = 'rgba(255, 0, 0, 0.1)';
        }
    }

    // Event listeners for Google Auth events (script will be injected dynamically)
    document.addEventListener('google-auth-token-processing', function(event) {
        updateUI('Processing Token...', event.detail.message || 'Sending access token to server...');
    });

    document.addEventListener('google-auth-success', function(event) {
        updateUI('Authentication Successful!', event.detail.message || 'You may now close this tab.');
    });

    document.addEventListener('google-auth-error', function(event) {
        updateUI('Authentication Failed', event.detail.message || 'An error occurred during authentication.', false);
    });
</script>
</body>
</html>
